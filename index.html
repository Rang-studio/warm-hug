<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>따뜻한 포옹</title>

<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Gaegu', cursive;
background:linear-gradient(180deg,#fff7fa,#fffdf5);
display:flex;
justify-content:center;
}

#app{
max-width:820px;
width:100%;
padding:40px 20px;
}

h1{
text-align:center;
font-size:38px;
margin-bottom:8px;
}

.subtitle{
text-align:center;
color:#777;
margin-bottom:35px;
font-size:18px;
}

.roomContainer{
display:flex;
flex-direction:column;
gap:18px;
}

.room{
background:white;
border-radius:24px;
padding:24px;
box-shadow:0 12px 30px rgba(0,0,0,0.08);
display:flex;
justify-content:space-between;
align-items:center;
}

.roomName{
font-size:20px;
}

.roomCount{
font-size:15px;
color:#888;
margin-top:4px;
}

.enterBtn{
background:#ffd9e8;
border:none;
padding:10px 16px;
border-radius:14px;
cursor:pointer;
font-size:16px;
font-family:'Gaegu', cursive;
}

.enterBtn:hover{
background:#ffc6dc;
}

#chatArea{
margin-top:30px;
display:none;
}

.chatBox{
background:white;
border-radius:24px;
padding:22px;
box-shadow:0 12px 30px rgba(0,0,0,0.08);
}

.chatMessages{
max-height:240px;
overflow:auto;
margin-bottom:15px;
}

.msg{
background:#fff1f6;
padding:12px 16px;
border-radius:16px;
margin-bottom:10px;
max-width:70%;
font-size:17px;
}

.msg.me{
background:#e8f8ff;
margin-left:auto;
}

textarea{
width:100%;
height:80px;
border-radius:14px;
border:1px solid #eee;
padding:10px;
font-size:16px;
font-family:'Gaegu', cursive;
}

.sendBtn{
margin-top:8px;
background:#ffe5ef;
border:none;
padding:10px 16px;
border-radius:14px;
cursor:pointer;
font-family:'Gaegu', cursive;
font-size:16px;
}

.emojiBar{
margin-top:10px;
}

.emoji{
font-size:30px;
margin-right:8px;
cursor:pointer;
}

/* 포옹 팝업 */

#hugPopup{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
background:rgba(0,0,0,0.35);
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:999;
}

.hugBear{
font-size:48vw;
animation:hugMotion 1.4s ease-in-out infinite;
}

@keyframes hugMotion{
0%{transform:scale(0.92) rotate(-2deg)}
50%{transform:scale(1.05) rotate(2deg)}
100%{transform:scale(0.92) rotate(-2deg)}
}

.hugText{
background:white;
padding:20px 26px;
border-radius:22px;
font-size:20px;
margin-bottom:22px;
box-shadow:0 8px 22px rgba(0,0,0,0.15);
}

.heart{
position:absolute;
font-size:30px;
animation:float 2.2s ease-out forwards;
}

@keyframes float{
0%{transform:translateY(0);opacity:1}
100%{transform:translateY(-180px);opacity:0}
}

</style>
</head>

<body>

<div id="app">

<h1>따뜻한 포옹</h1>
<div class="subtitle">지금 잠깐, 마음을 쉬어가도 괜찮아요</div>

<div class="roomContainer">

<div class="room">
<div>
<div class="roomName">친구 방</div>
<div class="roomCount" id="friendsCount">0명 들어와 있어요</div>
</div>
<button class="enterBtn" onclick="enterRoom('friends')">들어가기</button>
</div>

<div class="room">
<div>
<div class="roomName">엄마 방</div>
<div class="roomCount" id="momCount">0명 들어와 있어요</div>
</div>
<button class="enterBtn" onclick="enterRoom('mom')">들어가기</button>
</div>

<div class="room">
<div>
<div class="roomName">전문가 방</div>
<div class="roomCount" id="proCount">0명 들어와 있어요</div>
</div>
<button class="enterBtn" onclick="enterRoom('pro')">들어가기</button>
</div>

</div>

<div id="chatArea">

<div class="chatBox">

<div class="chatMessages" id="chat"></div>

<textarea id="text" placeholder="마음을 짧게 적어보세요"></textarea>

<button class="sendBtn" onclick="sendMsg()">보내기</button>

<div class="emojiBar">
<span class="emoji" onclick="sendEmoji('🫂')">🫂</span>
<span class="emoji" onclick="sendEmoji('💗')">💗</span>
<span class="emoji" onclick="sendEmoji('🌼')">🌼</span>
<span class="emoji" onclick="sendEmoji('🤍')">🤍</span>
</div>

</div>

</div>

</div>

<div id="hugPopup">
<div class="hugText" id="hugText"></div>
<div class="hugBear">ʕっ•ᴥ•ʔっ</div>
</div>

<script>

let counts={friends:0,mom:0,pro:0}

function enterRoom(room){
counts[room]++
updateCounts()
document.getElementById("chatArea").style.display="block"
showHug()
}

function updateCounts(){
document.getElementById("friendsCount").innerText=counts.friends+"명 들어와 있어요"
document.getElementById("momCount").innerText=counts.mom+"명 들어와 있어요"
document.getElementById("proCount").innerText=counts.pro+"명 들어와 있어요"
}

function sendMsg(){
let t=document.getElementById("text")
if(t.value.trim()=="") return

let div=document.createElement("div")
div.className="msg me"
div.innerText=t.value
chat.appendChild(div)

spawnHearts()
showHug()

t.value=""
}

function sendEmoji(e){
let div=document.createElement("div")
div.className="msg"
div.innerText=e
chat.appendChild(div)
}

const messages=[
"괜찮아요. 여기서는 편히 쉬어도 돼요.",
"오늘도 정말 잘 버텼어요.",
"잠깐 안아줄게요.",
"조금만 쉬어가도 괜찮아요.",
"당신은 충분히 잘하고 있어요."
]

function showHug(){
let popup=document.getElementById("hugPopup")
let text=document.getElementById("hugText")

let random=messages[Math.floor(Math.random()*messages.length)]
text.innerText=random

popup.style.display="flex"

setTimeout(()=>{popup.style.display="none"},2500)
}

function spawnHearts(){
for(let i=0;i<12;i++){
let h=document.createElement("div")
h.className="heart"
h.innerText="💗"

h.style.left=Math.random()*100+"vw"
h.style.top=(60+Math.random()*20)+"vh"

document.body.appendChild(h)
setTimeout(()=>h.remove(),2000)
}
}

</script>

</body>
</html>
