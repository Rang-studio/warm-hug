<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>따뜻한 포옹</title>
  <style>
    :root{
      --bg1:#2f241d;
      --bg2:#5c4331;
      --warm:#f4d8b6;
      --cream:#fff6ea;
      --card:#fffaf3;
      --brown:#6b4a36;
    }

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      font-family:"Arial","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
      min-height:100vh;
      color:#4f3729;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,210,140,.25), transparent 20%),
        radial-gradient(circle at 80% 15%, rgba(255,230,170,.18), transparent 18%),
        linear-gradient(180deg,var(--bg2),var(--bg1));
      overflow:hidden;
    }

    .frame{
      width:min(920px,94vw);
      height:min(92vh,860px);
      margin:4vh auto;
      border-radius:32px;
      background:linear-gradient(180deg, rgba(255,246,234,.95), rgba(245,229,207,.96));
      box-shadow:0 24px 70px rgba(0,0,0,.28);
      border:1px solid rgba(255,255,255,.35);
      position:relative;
      overflow:hidden;
    }

    .frame::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        radial-gradient(circle at 85% 12%, rgba(255,203,105,.45), transparent 14%),
        radial-gradient(circle at 90% 18%, rgba(255,230,168,.40), transparent 18%);
    }

    .audioWrap{
      position:absolute;
      top:16px;
      right:16px;
      z-index:5;
      display:flex;
      flex-direction:column;
      align-items:flex-end;
      gap:8px;
    }

    #musicStatus{
      font-size:13px;
      color:#7a5a46;
      background:rgba(255,250,243,.88);
      padding:8px 10px;
      border-radius:14px;
      box-shadow:0 6px 14px rgba(0,0,0,.08);
      max-width:240px;
      text-align:right;
    }

    #bgm{
      width:240px;
    }

    header{
      text-align:center;
      font-size:36px;
      font-weight:700;
      padding:28px 24px 8px;
      color:#65442f;
    }

    .sub{
      text-align:center;
      color:#8b6a52;
      font-size:18px;
      margin-bottom:6px;
      padding:0 20px;
    }

    #home,#rooms,#chat{
      position:relative;
      z-index:2;
      height:calc(100% - 90px);
    }

    #home{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:16px;
      padding:24px;
      text-align:center;
    }

    .heroBear{
      font-size:132px;
      line-height:1;
      animation:idle 2.8s ease-in-out infinite;
      filter:drop-shadow(0 10px 20px rgba(0,0,0,.12));
    }

    .heroNote{
      background:rgba(255,250,243,.88);
      border-radius:999px;
      padding:12px 18px;
      font-size:20px;
      color:#7b5a45;
      box-shadow:0 10px 25px rgba(97,62,34,.10);
      max-width:740px;
    }

    button{
      border:none;
      border-radius:999px;
      background:linear-gradient(180deg,#f7d7b3,#efc695);
      color:#61412c;
      font-size:20px;
      font-weight:700;
      padding:14px 24px;
      cursor:pointer;
      box-shadow:0 10px 20px rgba(95,60,34,.16);
      transition:transform .15s ease, box-shadow .15s ease;
    }

    button:hover{
      transform:translateY(-2px) scale(1.02);
      box-shadow:0 14px 28px rgba(95,60,34,.2);
    }

    #rooms{
      display:none;
      padding:18px 22px 26px;
      overflow:auto;
    }

    .room{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:14px;
      background:rgba(255,250,243,.95);
      border:1px solid rgba(145,108,78,.10);
      border-radius:28px;
      margin:14px 0;
      padding:20px 22px;
      box-shadow:0 10px 24px rgba(76,48,28,.10);
      cursor:pointer;
    }

    .roomName{
      font-size:26px;
      font-weight:700;
      color:#65452f;
    }

    .roomMeta{
      font-size:16px;
      color:#96755d;
      margin-top:4px;
    }

    .roomTag{
      background:#f2dfc7;
      color:#78563f;
      padding:8px 14px;
      border-radius:999px;
      font-size:16px;
      white-space:nowrap;
    }

    #chat{
      display:none;
      flex-direction:column;
      padding:12px 18px 18px;
    }

    .chatTop{
      display:flex;
      align-items:center;
      gap:12px;
      padding:10px 8px 12px;
    }

    .chatBearMini{
      width:54px;
      height:54px;
      border-radius:18px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:30px;
      background:#f5ede3;
      box-shadow:0 8px 18px rgba(0,0,0,.12);
    }

    .chatTitle{
      font-size:24px;
      font-weight:700;
      color:#61412c;
    }

    .chatDesc{
      font-size:15px;
      color:#8c6d56;
    }

    #messages{
      flex:1;
      overflow:auto;
      padding:10px 4px 8px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .msgWrap{
      display:flex;
      flex-direction:column;
      gap:4px;
      max-width:72%;
    }

    .msgWrap.me{
      align-self:flex-end;
      align-items:flex-end;
    }

    .msgWrap.other{
      align-self:flex-start;
      align-items:flex-start;
    }

    .nick{
      font-size:13px;
      color:#8c6d56;
      padding:0 8px;
    }

    .msg{
      padding:14px 18px;
      border-radius:24px;
      font-size:18px;
      line-height:1.45;
      box-shadow:0 6px 18px rgba(76,48,28,.08);
      word-break:keep-all;
    }

    .me .msg{
      background:linear-gradient(180deg,#f5d3ad,#edc08c);
      color:#5f402d;
      border-bottom-right-radius:10px;
    }

    .other .msg{
      background:rgba(255,251,245,.98);
      color:#664935;
      border-bottom-left-radius:10px;
    }

    #inputBar{
      display:flex;
      gap:10px;
      padding:12px 6px 6px;
    }

    #msg{
      flex:1;
      border:none;
      outline:none;
      background:#fff9f3;
      padding:14px 16px;
      border-radius:999px;
      font-size:17px;
      color:#5f402d;
      box-shadow:inset 0 2px 8px rgba(0,0,0,.05);
    }

    #hug{
      position:fixed;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      z-index:30;
      background:rgba(47,36,29,.18);
      backdrop-filter:blur(1px);
    }

    .hugBearWrap{
      position:relative;
      width:300px;
      height:300px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .hugBear{
      width:220px;
      height:220px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:110px;
      background:#f7efe5;
      box-shadow:0 24px 55px rgba(0,0,0,.18);
      animation:hugBounce 1.15s infinite alternate ease-in-out;
    }

    .hugArm{
      position:absolute;
      top:56%;
      width:108px;
      height:66px;
      background:#f0ddce;
      border-radius:999px;
      box-shadow:0 8px 18px rgba(0,0,0,.08);
      opacity:.94;
    }

    .armL{
      left:6px;
      transform-origin:right center;
      animation:armL 1.15s infinite alternate;
    }

    .armR{
      right:6px;
      transform-origin:left center;
      animation:armR 1.15s infinite alternate;
    }

    #notice{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:30px;
      background:rgba(255,250,243,.98);
      color:#6b4a36;
      padding:14px 20px;
      border-radius:20px;
      box-shadow:0 10px 24px rgba(0,0,0,.14);
      display:none;
      z-index:50;
      font-size:17px;
    }

    .heart{
      position:fixed;
      font-size:28px;
      animation:float 2s linear forwards;
      z-index:40;
      pointer-events:none;
    }

    @keyframes hugBounce{
      from{transform:scale(1)}
      to{transform:scale(1.07)}
    }

      from{transform:rotate(8
