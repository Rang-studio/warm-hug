<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>따뜻한 포옹</title>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
<style>
body{
margin:0;
font-family:'Gaegu',cursive;
background:linear-gradient(180deg,#fff9fb,#ffeef6);
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
color:#5b4b53;
overflow:hidden;
}
body:before{
content:"";
position:fixed;
inset:0;
pointer-events:none;
background:
radial-gradient(circle at 40px 40px,#ffffff 35px,transparent 36px),
radial-gradient(circle at calc(100% - 40px) 40px,#ffffff 35px,transparent 36px),
radial-gradient(circle at 40px calc(100% - 40px),#ffffff 35px,transparent 36px),
radial-gradient(circle at calc(100% - 40px) calc(100% - 40px),#ffffff 35px,transparent 36px);
opacity:0.9;
}
header{
font-size:36px;
padding:24px;
position:relative;
z-index:1;
}
#home{
flex:1;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
position:relative;
z-index:1;
}
.heroBear{
width:270px;
height:270px;
object-fit:cover;
border-radius:28px;
box-shadow:0 14px 30px rgba(0,0,0,0.08);
animation:idleBounce 2.2s infinite ease-in-out;
background:white;
}
@keyframes idleBounce{
0%{transform:translateY(0)}
50%{transform:translateY(-8px)}
100%{transform:translateY(0)}
}
button{
padding:14px 26px;
font-size:20px;
border:none;
border-radius:30px;
background:#ffd6e7;
cursor:pointer;
box-shadow:0 6px 16px rgba(0,0,0,0.08);
font-family:'Gaegu';
}
button:hover{transform:scale(1.05)}
#rooms{
display:none;
width:90%;
max-width:600px;
position:relative;
z-index:1;
}
.room{
background:white;
padding:18px;
border-radius:28px;
margin:12px 0;
box-shadow:0 6px 18px rgba(0,0,0,0.06);
display:flex;
justify-content:space-between;
font-size:20px;
cursor:pointer;
}
#chat{
display:none;
flex-direction:column;
width:100%;
max-width:600px;
height:100vh;
position:relative;
z-index:1;
}
#messages{
flex:1;
padding:20px;
overflow-y:auto;
}
.msg{
margin:10px 0;
padding:14px 18px;
border-radius:26px;
max-width:65%;
font-size:18px;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
position:relative;
}
.me{
background:#ffd6e7;
align-self:flex-end;
border-bottom-right-radius:10px;
}
.other{
background:white;
align-self:flex-start;
border-bottom-left-radius:10px;
}
#inputBar{
display:flex;
padding:10px;
background:white;
border-top:1px solid #eee;
}
#inputBar input{
flex:1;
border:none;
background:#f4f4f4;
padding:12px;
border-radius:24px;
font-family:'Gaegu';
font-size:16px;
}
#inputBar button{
margin-left:10px;
border-radius:24px;
}
#hug{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:none;
align-items:center;
justify-content:center;
z-index:10;
background:rgba(255,249,251,0.35);
}
.hugBearWrap{
position:relative;
display:flex;
align-items:center;
justify-content:center;
}
.hugBear{
width:min(72vw,420px);
height:min(72vw,420px);
object-fit:cover;
border-radius:36px;
box-shadow:0 18px 40px rgba(0,0,0,0.10);
animation:hugBounce 1.2s infinite alternate ease-in-out;
background:white;
}
@keyframes hugBounce{
from{transform:scale(1)}
to{transform:scale(1.08)}
}
.hugArm{
position:absolute;
top:55%;
width:110px;
height:72px;
background:#f6e6e4;
border-radius:999px;
box-shadow:0 6px 12px rgba(0,0,0,0.08);
opacity:0.92;
}
.armL{
left:-14px;
transform-origin:right center;
animation:armL 1.2s infinite alternate;
}
.armR{
right:-14px;
transform-origin:left center;
animation:armR 1.2s infinite alternate;
}
@keyframes armL{from{transform:rotate(8deg)}to{transform:rotate(-24deg)}}
@keyframes armR{from{transform:rotate(-8deg)}to{transform:rotate(24deg)}}
.heart{
position:fixed;
font-size:30px;
animation:float 2s linear forwards;
}
@keyframes float{
0%{opacity:1;transform:translateY(0)}
100%{opacity:0;transform:translateY(-180px)}
}
#notice{
position:fixed;
bottom:120px;
background:white;
padding:14px 20px;
border-radius:20px;
box-shadow:0 8px 20px rgba(0,0,0,0.15);
display:none;
z-index:20;
}
.helper{
margin-top:12px;
font-size:17px;
color:#786772;
}
</style>
</head>
<body>
<audio id="bgm" autoplay loop>
  <source src="cozy_hug_bgm.wav" type="audio/wav">
</audio>
<audio id="pop" preload="auto">
  <source src="https://cdn.pixabay.com/download/audio/2022/03/10/audio_2a1c2f2e4a.mp3" type="audio/mpeg">
</audio>
<header>따뜻한 포옹</header>
<div id="home">
<img class="heroBear" src="bear.png" alt="곰돌이" />
<div class="helper">포근한 차 한 잔처럼, 잠깐 쉬어가도 괜찮아요</div>
<button onclick="enterRooms()">포옹 받으러 들어가기</button>
</div>
<div id="rooms">
<div class="room" onclick="enterRoom('친구방')">친구방 <span id="c1">0</span></div>
<div class="room" onclick="enterRoom('엄마방')">엄마방 <span id="c2">0</span></div>
<div class="room" onclick="enterRoom('전문가방')">전문가방 <span id="c3">0</span></div>
</div>
<div id="chat">
<div id="messages"></div>
<div id="inputBar">
<input id="msg" placeholder="따뜻한 말을 보내보세요"/>
<button onclick="sendMsg()">보내기</button>
</div>
</div>
<div id="hug">
  <div class="hugBearWrap">
    <div class="hugArm armL"></div>
    <img class="hugBear" src="bear.png" alt="곰돌이 포옹" />
    <div class="hugArm armR"></div>
  </div>
</div>
<div id="notice"></div>
<script>
const names=["옥수수차","둥글레차","홍차","녹차"];
let nickname=names[Math.floor(Math.random()*names.length)];
function sound(){
  const pop=document.getElementById('pop');
  pop.currentTime=0;
  pop.play().catch(()=>{});
}
function startBgm(){
  const bgm=document.getElementById('bgm');
  bgm.play().catch(()=>{});
}
document.addEventListener('click', startBgm, {once:true});
function enterRooms(){
  sound();
  document.getElementById('home').style.display='none';
  document.getElementById('rooms').style.display='block';
}
function enterRoom(){
  sound();
  document.getElementById('rooms').style.display='none';
  document.getElementById('chat').style.display='flex';
  notice(nickname+'님이 입장했습니다.');
}
function sendMsg(){
  let input=document.getElementById('msg');
  let text=input.value.trim();
  if(text==='') return;
  sound();
  let m=document.createElement('div');
  m.className='msg me';
  m.innerText=text;
  messages.appendChild(m);
  input.value='';
  hug();
}
function hug(){
  let h=document.getElementById('hug');
  h.style.display='flex';
  for(let i=0;i<12;i++){
    let heart=document.createElement('div');
    heart.className='heart';
    heart.innerText='💗';
    heart.style.left=Math.random()*100+'%';
    heart.style.bottom='0';
    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),2000);
  }
  setTimeout(()=>h.style.display='none',1500);
}
function notice(t){
  let n=document.getElementById('notice');
  n.innerText=t;
  n.style.display='block';
  setTimeout(()=>n.style.display='none',3000);
}
window.addEventListener('beforeunload',()=>{
  notice(nickname+'님이 나가셨습니다.');
});
</script>
</body>
</html>
